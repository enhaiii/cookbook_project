<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная</title>
    <link rel="stylesheet" href="../static/style/hf_style.css">
    {%block style%}
    {%endblock%}
</head>
<body>
    <header>
        <div class="menu">
            <div class="head_content">
                <img src="../static/media/logo.svg" alt="logo" class="logo">
                <div class="search">
                    <input type="text" placeholder="Поиск рецепта..">
                    <img src="../static/media/filter.svg" alt="filter" class="filter">
                    <a href="#"><img src="../static/media/lupa.svg" alt="lupa" class="lupa"></a>
                </div>
                <div class="pages">
                    <p class="name_page">Рецепты</p>
                    <p class="name_page">Статьи</p>
                </div>
                <a href="#" class="button_sign_in"><p class="sign_in">Войти</p></a>
            </div>
        </div>
    </header>    
    <main>
        {%block main%}
        {%endblock%}
    </main>
    <footer>
        <div class="main_footer">
            <div class="footer_content">
                <div class="top">
                    <img src="../static/media/logo.svg" alt="logo" class="logo_footer">
                    <div class="column">
                        <p class="text_page">Рецепты</p>
                        <p class="text_page">Статьи</p>
                        <p class="text_page">Профиль</p>
                    </div>
                    <div class="column">
                        <p class="text_page">Любимое</p>
                        <p class="text_page">Мои рецепты</p>
                        <p class="text_page">Мои комментарии</p>
                    </div>
                </div>
                <div class="bottom">
                    <p class="prava">© 2025 Харченко К.А.</p>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
